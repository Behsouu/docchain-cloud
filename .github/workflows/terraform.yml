name: DocChain CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer les dépendances
        run: pip install flask python-dotenv prometheus-client
      - name: Lancer les tests
        run: python -c "from app.app import app; print('Import Flask OK')"

  terraform:
    name: Validation Terraform IaC
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.0
      - name: Terraform Init
        working-directory: ./infra
        run: terraform init -backend=false
      - name: Terraform Validate
        working-directory: ./infra
        run: terraform validate
      - name: Terraform Format Check
        working-directory: ./infra
        run: terraform fmt -check

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image Docker
        run: docker build -t docchain:${{ github.sha }} .
      - name: Verification image
        run: echo "Image Docker construite avec succes - SHA ${{ github.sha }}"